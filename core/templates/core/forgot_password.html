<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password | Student Management</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .forgot-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .forgot-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }
        .form-control {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #764ba2;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .info-text {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .success-message {
            color: green;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <h2>Reset Password</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="success-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <p class="info-text">Enter your email address and we'll send you instructions to reset your password.</p>
        
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" class="form-control" placeholder="Enter your Gmail/Email" required>
            <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>
        
        <div class="links">
            <a href="{% url 'login' %}">Back to Login</a>
            <a href="{% url 'register' %}">Create New Account</a>
        </div>
    </div>
</body>
</html>
