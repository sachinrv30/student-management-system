{% extends 'core/base.html' %}
{% block title %}Dashboard{% endblock %}

{% block main_content %}
<h3>Dashboard</h3>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card p-3">
            <h5>Total Students</h5>
            <h2>{{ student_count }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3">
            <h5>Total Courses</h5>
            <h2>{{ course_count }}</h2>
        </div>
    </div>
</div>
{% endblock %}
